name: 'Check Release Version'
description: 'Checks whether a version already exists as a GitHub release'
inputs:
  version:
    description: 'The version string to check'
    required: true
  repository:
    description: 'The repository in owner/repo format'
    required: true
  token:
    description: 'GitHub token for API authentication'
    required: false
outputs:
  exists:
    description: 'Whether the release version already exists (true/false)'
runs:
  using: 'node20'
  main: 'dist/index.js'
